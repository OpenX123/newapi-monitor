services:
  newapi-monitor:
    image: ghcr.io/your-username/newapi-monitor:latest
    # build: .  # 本地构建时取消注释
    container_name: newapi-monitor
    restart: unless-stopped
    ports:
      - "3456:3456"
    environment:
      - NEWAPI_BASE_URL=https://your-newapi-domain.com
      - NEWAPI_ACCESS_TOKEN=your_access_token
      - NEWAPI_USER_ID=1
      - DATABASE_URL=postgres://user:password@host:5432/newapi
      - DAILY_LIMIT=2000
      - POLL_INTERVAL=300000
      - PORT=3456
      # SMTP（可选）
      # - SMTP_HOST=smtp.qq.com
      # - SMTP_PORT=587
      # - SMTP_USER=your_email@qq.com
      # - SMTP_PASS=your_smtp_password
